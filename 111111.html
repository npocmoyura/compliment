<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Для тебе 💛</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: white;
      background: #000;
    }

    .page {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== ПЕРША СТОРІНКА ===== */

    #startPage {
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 25px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 120, 200, 0.8), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(255, 180, 80, 0.5), transparent 35%),
        linear-gradient(135deg, #250020, #59003f, #12001f);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }

    #startPage.hide {
      opacity: 0;
      transform: scale(1.2);
      pointer-events: none;
    }

    .start-box {
      max-width: 750px;
      animation: fadeUp 1.8s ease;
    }

    .heart-title {
      font-size: 48px;
      margin-bottom: 25px;
      animation: pulse 1.8s infinite;
    }

    h1 {
      font-size: clamp(34px, 7vw, 76px);
      line-height: 1.1;
      margin-bottom: 35px;
      text-shadow:
        0 0 15px #ff7bd5,
        0 0 35px #ff3fad,
        0 0 60px #ffb347;
    }

    button {
      border: none;
      padding: 18px 38px;
      font-size: 22px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #ff4fa3, #ffb347);
      box-shadow:
        0 0 20px rgba(255, 100, 180, 0.9),
        0 0 45px rgba(255, 180, 80, 0.6);
      transition: 0.3s ease;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 35px rgba(255, 100, 180, 1),
        0 0 70px rgba(255, 200, 100, 0.9);
    }

    /* ===== КОСМОС ===== */

    #spacePage {
      z-index: 1;
      opacity: 0;
      transition: opacity 1.5s ease;
      background:
        radial-gradient(circle at 20% 30%, rgba(114, 35, 180, 0.55), transparent 25%),
        radial-gradient(circle at 75% 20%, rgba(45, 125, 255, 0.35), transparent 28%),
        radial-gradient(circle at 60% 75%, rgba(255, 80, 180, 0.32), transparent 30%),
        radial-gradient(circle at center, #13002b 0%, #050014 45%, #000 100%);
    }

    #spacePage.active {
      opacity: 1;
      z-index: 20;
    }

    .nebula {
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(circle at 30% 40%, rgba(156, 65, 255, 0.35), transparent 28%),
        radial-gradient(circle at 70% 35%, rgba(0, 140, 255, 0.22), transparent 25%),
        radial-gradient(circle at 50% 75%, rgba(255, 40, 160, 0.25), transparent 30%);
      filter: blur(35px);
      animation: nebulaMove 25s ease-in-out infinite alternate;
    }

    .stars,
    .stars::before,
    .stars::after {
      position: absolute;
      inset: 0;
      content: "";
      background-repeat: repeat;
      animation: starsDrift linear infinite;
    }

    .stars {
      background-image:
        radial-gradient(white 1px, transparent 1.5px),
        radial-gradient(rgba(255,255,255,0.7) 1px, transparent 1.5px);
      background-size: 80px 80px, 130px 130px;
      animation-duration: 45s;
      opacity: 0.9;
    }

    .stars::before {
      background-image:
        radial-gradient(rgba(255,255,255,0.9) 1.5px, transparent 2px),
        radial-gradient(rgba(180,220,255,0.8) 1px, transparent 1.5px);
      background-size: 170px 170px, 220px 220px;
      animation-duration: 70s;
      opacity: 0.65;
    }

    .stars::after {
      background-image:
        radial-gradient(rgba(255,255,255,0.9) 2px, transparent 2.5px);
      background-size: 260px 260px;
      animation-duration: 100s;
      opacity: 0.4;
    }

    .twinkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 12px white;
      animation: twinkle 2s infinite alternate;
    }

    .shooting-star {
      position: absolute;
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, white, transparent);
      transform: rotate(-25deg);
      opacity: 0;
      animation: shooting 5s linear infinite;
    }

    /* ===== ФОТО І КОМПЛІМЕНТИ ===== */

    .falling-item {
      position: absolute;
      top: -330px;
      width: 210px;
      text-align: center;
      animation-name: fallPhoto;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      z-index: 5;
    }

    .falling-item img {
      width: 210px;
      height: 255px;
      object-fit: cover;
      border-radius: 26px;
      border: 3px solid rgba(255,255,255,0.85);
      box-shadow:
        0 0 20px rgba(255, 130, 220, 0.9),
        0 0 45px rgba(120, 80, 255, 0.7);
      animation: photoFloat 3s ease-in-out infinite alternate;
    }

    .compliment {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 700;
      color: #fff4fb;
      background: rgba(20, 0, 35, 0.55);
      backdrop-filter: blur(8px);
      text-shadow: 0 0 12px #ff72d2;
      box-shadow: 0 0 18px rgba(255, 100, 190, 0.35);
    }

    /* ===== СЕРДЕЧКА ===== */

    .space-heart {
      position: absolute;
      top: -70px;
      z-index: 4;
      opacity: 0.8;
      animation-name: heartFly;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      filter: drop-shadow(0 0 8px #ff6fcf);
    }

    .burst-heart {
      position: absolute;
      left: 50%;
      top: 50%;
      font-size: 24px;
      animation: burst 1.4s ease-out forwards;
      z-index: 30;
    }

    /* ===== АНІМАЦІЇ ===== */

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
    }

    @keyframes starsDrift {
      from {
        background-position: 0 0;
      }
      to {
        background-position: 0 900px;
      }
    }

    @keyframes nebulaMove {
      from {
        transform: scale(1) translate(0, 0);
      }
      to {
        transform: scale(1.15) translate(-3%, 3%);
      }
    }

    @keyframes twinkle {
      from {
        opacity: 0.25;
        transform: scale(0.7);
      }
      to {
        opacity: 1;
        transform: scale(1.5);
      }
    }

    @keyframes shooting {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(-25deg);
      }
      10% {
        opacity: 1;
      }
      35% {
        opacity: 0;
        transform: translate(-500px, 260px) rotate(-25deg);
      }
      100% {
        opacity: 0;
      }
    }

    @keyframes fallPhoto {
      from {
        transform: translateY(-350px) rotate(-5deg);
      }
      to {
        transform: translateY(135vh) rotate(5deg);
      }
    }

    @keyframes photoFloat {
      from {
        transform: translateX(-8px) rotate(-2deg);
      }
      to {
        transform: translateX(8px) rotate(2deg);
      }
    }

    @keyframes heartFly {
      from {
        transform: translateY(-100px) translateX(0) rotate(0deg);
      }
      to {
        transform: translateY(125vh) translateX(80px) rotate(360deg);
      }
    }

    @keyframes burst {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.4);
      }
      to {
        opacity: 0;
        transform:
          translate(
            calc(-50% + var(--x)),
            calc(-50% + var(--y))
          )
          scale(1.8)
          rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .heart-title {
        font-size: 36px;
      }

      .falling-item {
        width: 150px;
      }

      .falling-item img {
        width: 150px;
        height: 190px;
        border-radius: 22px;
      }

      .compliment {
        font-size: 15px;
        padding: 8px 10px;
      }

      button {
        font-size: 18px;
        padding: 15px 26px;
      }
    }
  </style>
</head>

<body>

  <section id="startPage" class="page">
    <div class="start-box">
      <div class="heart-title">💖 💛 💖</div>
      <h1>Пам'ятай що ти найкраща</h1>
      <button onclick="openSpace()">Сонечко, нажми мене</button>
    </div>
  </section>

  <section id="spacePage" class="page">
    <div class="nebula"></div>
    <div class="stars"></div>
  </section>

  <script>
    const photos = [
      {
        image: "https://i.ibb.co/yndwRFN7/photo-2026-06-23-18-06-35.jpg",
        text: "Сяй постійно, тобі дуже личить"
      },
      {
        image: "https://i.ibb.co/HDVCT1mb/photo-2025-03-14-14-55-46.jpg",
        text: "Шикарна, і така ніжна та жіноча, мммм"
      },
      {
        image: "https://i.ibb.co/4RyN5wcf/photo-2026-06-24-09-45-39.jpg",
        text: "Ти дивовижна, і така мімімі мила"
      },
      {
        image: "https://i.ibb.co/Q7tdRqQM/photo-2026-05-11-22-00-49.jpg",
        text: "Твій погляд, захоплює до мурашок"
      },
      {
        image: "https://i.ibb.co/wrhXjFH1/photo-2026-03-16-08-42-35.jpg",
        text: "Промінчики сонця, тягнуться до сонечка"
      },
      {
        image: "https://i.ibb.co/LXMj2NYV/photo-2025-09-03-21-44-53.jpg",
        text: "Оченята в яких хочеться тонути"
      },
      {
        image: "https://i.ibb.co/Kz8PSfZm/2026-06-25-222841902.png",
        text: "Ух, яка, а це волосся"
      }
    ];

    const startPage = document.getElementById("startPage");
    const spacePage = document.getElementById("spacePage");

    let started = false;

    function openSpace() {
      if (started) return;
      started = true;

      createHeartBurst();

      setTimeout(() => {
        startPage.classList.add("hide");
        spacePage.classList.add("active");

        createTwinkleStars();
        createShootingStars();
        startFallingPhotos();
        startSpaceHearts();
      }, 900);
    }

    function createHeartBurst() {
      for (let i = 0; i < 45; i++) {
        const heart = document.createElement("div");
        heart.className = "burst-heart";
        heart.innerText = Math.random() > 0.5 ? "💖" : "💛";

        const angle = Math.random() * Math.PI * 2;
        const distance = 120 + Math.random() * 350;

        heart.style.setProperty("--x", Math.cos(angle) * distance + "px");
        heart.style.setProperty("--y", Math.sin(angle) * distance + "px");

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 1500);
      }
    }

    function createTwinkleStars() {
      for (let i = 0; i < 90; i++) {
        const star = document.createElement("div");
        star.className = "twinkle";

        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        star.style.animationDelay = Math.random() * 3 + "s";
        star.style.animationDuration = 1.5 + Math.random() * 3 + "s";

        spacePage.appendChild(star);
      }
    }

    function createShootingStars() {
      setInterval(() => {
        const shooting = document.createElement("div");
        shooting.className = "shooting-star";

        shooting.style.left = 60 + Math.random() * 40 + "vw";
        shooting.style.top = Math.random() * 45 + "vh";
        shooting.style.animationDuration = 3 + Math.random() * 3 + "s";

        spacePage.appendChild(shooting);

        setTimeout(() => {
          shooting.remove();
        }, 6000);
      }, 4500);
    }

    function startFallingPhotos() {
      photos.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "falling-item";

        card.style.left = Math.random() * 75 + "vw";
        card.style.animationDuration = 13 + Math.random() * 8 + "s";
        card.style.animationDelay = index * 2.4 + "s";

        card.innerHTML = `
          <img src="${item.image}" alt="Фото">
          <div class="compliment">${item.text}</div>
        `;

        spacePage.appendChild(card);
      });
    }

    function startSpaceHearts() {
      setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "space-heart";
        heart.innerText = Math.random() > 0.5 ? "💖" : "💛";

        heart.style.left = Math.random() * 95 + "vw";
        heart.style.fontSize = 18 + Math.random() * 28 + "px";
        heart.style.animationDuration = 9 + Math.random() * 9 + "s";

        spacePage.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 18000);
      }, 1200);
    }
  </script>

</body>
</html>
